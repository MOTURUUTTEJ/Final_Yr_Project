<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NeuroGuard Stroke Risk AI</title>
  <meta name="description" content="Login to NeuroGuard – AI-powered brain stroke risk prediction platform">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
      background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(247,37,133,0.1) 0%, transparent 50%),
                  var(--bg);
    }
    .auth-box {
      width: 100%; max-width: 440px;
      background: rgba(26,22,48,0.8);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }
    .auth-logo {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 32px;
    }
    .auth-logo .icon-wrap {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; color: #fff;
      box-shadow: 0 8px 24px rgba(108,99,255,0.4);
      animation: heartbeat 1.4s ease-in-out infinite;
    }
    .auth-logo .brand-text { font-size: 1.3rem; font-weight: 800; color: #fff; }
    .auth-logo .brand-sub  { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
    h2 { font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
    .auth-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 28px; }
    .auth-footer {
      text-align: center; margin-top: 24px;
      font-size: 0.88rem; color: var(--muted);
    }
    .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }
    .input-icon { position: relative; }
    .input-icon i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.95rem;
    }
    .input-icon .form-control { padding-left: 42px; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>
  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <div class="auth-box">
    <div class="auth-logo">
      <div class="icon-wrap"><i class="fas fa-brain"></i></div>
      <div>
        <div class="brand-text">NeuroGuard</div>
        <div class="brand-sub">Stroke Risk AI</div>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to your account to continue</p>

    {% if error %}
    <div class="alert alert-danger">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">
      <i class="fas fa-check-circle"></i> {{ success }}
    </div>
    {% endif %}

    <form method="POST" id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" class="form-control" id="username" name="username"
                 placeholder="Enter your username" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-control" id="password" name="password"
                 placeholder="Enter your password" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn" style="margin-top:8px;">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="divider">or</div>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one free</a>
    </div>
  </div>

  <script>
    // Particle effect
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 6 + 3;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        animation-duration:${Math.random()*12+8}s;
        animation-delay:-${Math.random()*10}s;
        opacity:${Math.random()*0.15+0.05};
      `;
      container.appendChild(p);
    }

    // Button loading state
    document.getElementById('login-form').addEventListener('submit', function() {
      const btn = document.getElementById('login-btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
      btn.disabled = true;
    });
  </script>
</body>
</html>
