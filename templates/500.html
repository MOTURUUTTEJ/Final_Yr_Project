<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 Server Error — NeuroGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .code {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444, #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }
    </style>
</head>

<body>
    <div class="fade-up">
        <div class="code">500</div>
        <h2 style="font-size:1.5rem; margin:16px 0 8px;">Internal Server Error</h2>
        <p style="color:var(--muted); margin-bottom:28px;">Something went wrong on our end. Please try again shortly.
        </p>
        <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Go Home</a>
    </div>
</body>

</html>
